name: 每日抓取民调

on:
  schedule:
    - cron: '30 6 * * *'   # 每日 UTC 06:30(巴黎 08:30 左右)
  workflow_dispatch:        # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install supabase pandas requests beautifulsoup4 lxml

      - name: 抓取维基民调并入库
        run: python scripts/fetch_polls.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: 失败时推送 ntfy 通知
        if: failure()
        run: |
          curl -s -H "Title: election-2027 fetch failed" -H "Tags: warning" \
               -d "每日民调抓取 workflow 失败(可能是维基页面结构变化或英文源比法文新),请检查 GitHub Actions 日志" \
               https://ntfy.sh/ss-calendar-update
